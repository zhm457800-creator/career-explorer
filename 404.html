<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Career Explorer</title>
  <script>
    var path = window.location.pathname;
    if (!path || path === '/') {
      path = '/career-explorer/';
    } else {
      path = '/career-explorer/' + path.replace(/^\//, '');
    }
    window.location.href = path;
  </script>
</head>
<body>
  <p>Redirecting to home...</p>
</body>
</html>
