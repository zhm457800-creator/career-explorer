<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Career Explorer</title>
  <script>
    // 获取当前路径并重定向到正确的子目录
    var path = window.location.pathname;
    if (path.startsWith('/career-explorer')) {
      // 已经在正确路径
    } else if (path === '/' || path === '') {
      path = '/career-explorer/';
    } else {
      path = '/career-explorer' + path;
    }
    window.location.replace(path);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
